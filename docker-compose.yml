services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # ── Required ────────────────────────────────────────────────────────────────
      # Must be set in your shell or a backend/.env file before running.
      # Example: export ANTHROPIC_API_KEY=sk-ant-...
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # ── App ──────────────────────────────────────────────────────────────────────
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # ── Models ───────────────────────────────────────────────────────────────────
      HAIKU_MODEL: ${HAIKU_MODEL:-claude-haiku-4-5-20251001}
      SONNET_MODEL: ${SONNET_MODEL:-claude-sonnet-4-6}

      # ── ChromaDB ─────────────────────────────────────────────────────────────────
      CHROMA_PERSIST_DIR: ${CHROMA_PERSIST_DIR:-/app/data/chroma}
      CHROMA_COLLECTION_NAME: ${CHROMA_COLLECTION_NAME:-blossom_knowledge}

      # ── SQLite session store ──────────────────────────────────────────────────────
      SQLITE_DB_PATH: ${SQLITE_DB_PATH:-/app/data/sessions.db}

      # ── Retrieval & reflexion thresholds ─────────────────────────────────────────
      RETRIEVAL_ROUTING_THRESHOLD: ${RETRIEVAL_ROUTING_THRESHOLD:-0.50}
      REFLEXION_CONFIDENCE_THRESHOLD: ${REFLEXION_CONFIDENCE_THRESHOLD:-0.60}
      REFLEXION_EMBEDDING_THRESHOLD: ${REFLEXION_EMBEDDING_THRESHOLD:-0.60}
      MAX_REFLEXION_ATTEMPTS: ${MAX_REFLEXION_ATTEMPTS:-2}

      # ── Chunking ─────────────────────────────────────────────────────────────────
      CHUNK_SIZE_TOKENS: ${CHUNK_SIZE_TOKENS:-500}
      CHUNK_OVERLAP_TOKENS: ${CHUNK_OVERLAP_TOKENS:-50}

      # ── Session history ───────────────────────────────────────────────────────────
      SESSION_HISTORY_MAX_TURNS: ${SESSION_HISTORY_MAX_TURNS:-3}

      # ── CORS ─────────────────────────────────────────────────────────────────────
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}

      # ── PDF source ───────────────────────────────────────────────────────────────
      PDF_DIR: /app/sample_docs
    volumes:
      - ./backend/data:/app/data
      - ./sample_docs:/app/sample_docs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mcp:
    build: ./backend
    ports:
      - "8001:8001"
    environment:
      MCP_TRANSPORT: sse
      MCP_PORT: 8001
    command: ["python", "-m", "mcp_server.holidays_mcp"]
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
